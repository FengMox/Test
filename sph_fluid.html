<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPH Fluid Lab — Water & Wax</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f1a;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
    font-family:'Segoe UI',system-ui,sans-serif;
    user-select:none; -webkit-user-select:none;
    gap:10px;
  }
  #container {
    position:relative;
    border-radius:12px; overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
  }
  canvas { display:block; cursor:crosshair; }
  #ui {
    position:absolute; top:12px; left:16px;
    color:#888; font-size:13px; pointer-events:none; line-height:1.6;
  }
  #ui span { color:#ccc; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:#555; font-size:13px; pointer-events:none; white-space:nowrap;
  }

  /* ---- toolbar ---- */
  #toolbar {
    display:flex; flex-direction:column; gap:8px;
    background:rgba(20,20,40,0.92); border-radius:10px;
    padding:10px 14px; border:1px solid #2a2a40;
    max-width:900px;
  }
  .tool-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .tool-btn {
    padding:6px 12px; border-radius:6px; border:1px solid #3a3a50;
    background:#1a1a30; color:#aaa; cursor:pointer;
    font-size:12px; transition:all 0.15s; white-space:nowrap;
    font-family:inherit;
  }
  .tool-btn:hover { background:#2a2a45; color:#ddd; border-color:#555; }
  .tool-btn.active { background:#2a4a6a; color:#fff; border-color:#5599cc; box-shadow:0 0 8px rgba(80,140,220,0.3); }

  .slider-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; align-items:center; }
  .slider-group { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .slider-group label { font-size:10px; color:#777; }
  .slider-group input[type=range] {
    width:80px; height:4px; -webkit-appearance:none; appearance:none;
    background:#2a2a40; border-radius:2px; outline:none; cursor:pointer;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:#5599cc; cursor:pointer; border:none;
  }
  .slider-group .val { font-size:10px; color:#999; }

  .action-row { display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; }

  /* gravity pad */
  .grav-pad {
    display:grid; grid-template-columns:32px 32px 32px;
    grid-template-rows:32px 32px 32px; gap:3px;
  }
  .grav-btn {
    width:32px; height:32px; border-radius:5px; border:1px solid #3a3a50;
    background:#1a1a30; color:#aaa; cursor:pointer; font-size:14px;
    transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    font-family:inherit; line-height:1;
  }
  .grav-btn:hover { background:#2a2a45; color:#ddd; }
  .grav-btn.grav-active { background:#3a5a40; border-color:#5a9; color:#fff; box-shadow:0 0 8px rgba(80,170,100,0.3); }
  .grav-reverse { color:#cc8833; }
  .grav-reverse.active { background:#5a3a20; border-color:#c83; box-shadow:0 0 8px rgba(200,120,40,0.3); }

  .action-btn {
    padding:7px 14px; border-radius:6px; border:1px solid #3a3a50;
    background:#1a1a30; color:#aaa; cursor:pointer; font-size:12px;
    transition:all 0.15s; font-family:inherit; white-space:nowrap;
  }
  .action-btn:hover { background:#2a2a45; color:#ddd; }
  .action-btn.recording { background:#5a2020; border-color:#c44; color:#f88; animation:pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  #status { font-size:11px; color:#666; min-width:100px; text-align:center; }

  @media (max-width:950px) {
    .slider-group input[type=range] { width:55px; }
    .tool-btn { padding:5px 8px; font-size:11px; }
  }
</style>
</head>
<body>

<div id="container">
  <canvas id="canvas"></canvas>
  <div id="ui">
    FPS: <span id="fps">--</span>&nbsp;|&nbsp;
    N: <span id="count">--</span>&nbsp;|&nbsp;
    <span style="color:#4da6ff">Water</span>/<span style="color:#f0b028">Wax</span>&nbsp;|&nbsp;
    T: <span id="toolName">搅拌</span>
  </div>
  <div id="hint">R=重置 &nbsp; Space=反转重力 &nbsp; 滚轮=增减粒子 &nbsp; 右键=移除障碍</div>
</div>

<div id="toolbar">
  <div class="tool-row" id="toolRow">
    <button class="tool-btn active" data-tool="stir">🖐 搅拌</button>
    <button class="tool-btn" data-tool="injectWater">💧 注水</button>
    <button class="tool-btn" data-tool="injectWax">🕯 注蜡</button>
    <button class="tool-btn" data-tool="bubble">🫧 气泡</button>
    <button class="tool-btn" data-tool="obstacle">🧱 障碍</button>
    <button class="tool-btn" data-tool="tracer">📍 示踪</button>
  </div>
  <div class="slider-row">
    <div class="slider-group">
      <label>蜡粘度</label>
      <input type="range" id="sWaxVisc" min="0.03" max="0.5" step="0.01" value="0.18">
      <span class="val" id="vWaxVisc">0.18</span>
    </div>
    <div class="slider-group">
      <label>水粘度</label>
      <input type="range" id="sWatVisc" min="0.001" max="0.05" step="0.001" value="0.015">
      <span class="val" id="vWatVisc">0.015</span>
    </div>
    <div class="slider-group">
      <label>密度比</label>
      <input type="range" id="sDens" min="0.7" max="0.95" step="0.01" value="0.85">
      <span class="val" id="vDens">0.85</span>
    </div>
    <div class="slider-group">
      <label>重力</label>
      <input type="range" id="sGrav" min="200" max="2000" step="10" value="980">
      <span class="val" id="vGrav">980</span>
    </div>
    <div class="slider-group">
      <label>搅拌力</label>
      <input type="range" id="sStir" min="0.1" max="2" step="0.05" value="0.7">
      <span class="val" id="vStir">0.7</span>
    </div>
  </div>
  <div class="action-row">
    <div class="grav-pad" id="gravPad">
      <div></div><button class="grav-btn" data-angle="180">↑</button><div></div>
      <button class="grav-btn" data-angle="90">←</button>
      <button class="grav-btn grav-reverse" id="gravRev" title="反转重力">⟳</button>
      <button class="grav-btn" data-angle="270">→</button>
      <div></div><button class="grav-btn grav-active" data-angle="0">↓</button><div></div>
    </div>
    <button class="action-btn" id="recBtn">⏺ 录制</button>
    <button class="action-btn" id="rstBtn">🔄 重置</button>
    <span id="status"></span>
  </div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 900, H = 650;
canvas.width = W; canvas.height = H;

const GAMMA = 7;
const H_K = 24;
const SUPPORT = 2 * H_K;
const H2 = H_K * H_K;
const DT = 0.0025;
const MAX_SUBSTEPS = 10;
const MASS = 1.0;
const EPS_H2 = 0.01 * H2;

const T_WATER = 0, T_WAX = 1;

const BOWL_CX = W / 2, BOWL_CY = 435, BOWL_R = 215;

// Cubic spline: σ = 10/(7πh²)
const SIGMA = 10 / (7 * Math.PI * H2);
const SIGMA_OVER_H = SIGMA / H_K;

// ---- runtime-adjustable params ----
let STIR_RADIUS = 100;
let STIR_STRENGTH = 0.7;
let GRAVITY = 980;
let ALPHA_WATER = 0.015, ALPHA_WAX = 0.18;
let densityRatio = 0.85;

// Calibrated
let RHO0_WATER, RHO0_WAX, B_WATER, B_WAX;

// ============================================================
//  CUBIC SPLINE KERNEL (2D)
// ============================================================
function kernelW(r) {
  const q = r / H_K;
  if (q >= 2) return 0;
  const t = 2 - q, t3 = t * t * t;
  if (q < 1) { const s = 1 - q; return SIGMA * (t3 - 4 * s * s * s); }
  return SIGMA * t3;
}

function kernelDWdr(r) {
  if (r < 1e-8) return 0;
  const q = r / H_K;
  if (q >= 2) return 0;
  if (q < 1) { const t=2-q, s=1-q; return SIGMA_OVER_H * (-3*t*t + 12*s*s); }
  const t = 2 - q; return SIGMA_OVER_H * (-3 * t * t);
}

// ============================================================
//  SPATIAL GRID
// ============================================================
const CELL = SUPPORT;
const COLS = Math.ceil(W / CELL) + 1;
const ROWS = Math.ceil(H / CELL) + 1;
const GRID_SIZE = COLS * ROWS;
let gridCells = new Array(GRID_SIZE);
let gridCounts = new Int32Array(GRID_SIZE);

// ============================================================
//  GLOBAL STATE
// ============================================================
let particles = [], boundaries = [], allParticles = [];
let obstacles = [], bubbles = [];
let tracerIndices = [];        // indices into particles[]
let currentTool = 'stir';
let gravityAngle = 0;          // 0=down, 90=left, 180=up, 270=right
let gravityReversed = false;
let dragObstacle = null;

const AMBIENT_TEMP = 25;
const MAX_TEMP = 100;

let mouseX = BOWL_CX, mouseY = BOWL_CY;
let prevMouseX = -1000, prevMouseY = -1000;
let framePrevMX = -1000, framePrevMY = -1000;
let mouseDown = false;
let frameCount2 = 0;           // for per-2-frame trail updates

function rebuildAllParticles() {
  allParticles = particles.concat(boundaries);
}

// ============================================================
//  PARTICLES & BOUNDARIES
// ============================================================
function isInsideBowl(x, y, margin) {
  const dx = x - BOWL_CX, dy = y - BOWL_CY;
  return Math.sqrt(dx*dx + dy*dy) < BOWL_R - margin && y > BOWL_CY + margin * 0.3;
}

function initBoundaries() {
  boundaries = [];
  const layers = 3, layerGap = H_K / 3;
  const arcLen = Math.PI * BOWL_R;
  const nPerLayer = Math.floor(arcLen / (H_K / 2.8));
  for (let L = 0; L < layers; L++) {
    const r = BOWL_R - L * layerGap;
    for (let i = 0; i <= nPerLayer; i++) {
      const ang = (Math.PI * i) / nPerLayer;
      boundaries.push({
        x: BOWL_CX + r * Math.cos(ang), y: BOWL_CY + r * Math.sin(ang),
        vx:0, vy:0, rho:0, p:0, mass:MASS, isBoundary:true
      });
    }
  }
}

function initParticles() {
  particles = [];
  tracerIndices = [];
  const spacing = 10.5, margin = H_K * 0.8, rowH = spacing * 0.866;
  let row = 0;
  for (let py = BOWL_CY + margin * 0.3; py < BOWL_CY + BOWL_R - margin; py += rowH) {
    const offset = (row % 2) * spacing * 0.5;
    for (let px = BOWL_CX - BOWL_R + margin; px < BOWL_CX + BOWL_R - margin; px += spacing) {
      const x = px + offset, y = py + (Math.random() - 0.5) * spacing * 0.3;
      if (isInsideBowl(x, y, margin)) {
        const normY = (y - BOWL_CY) / BOWL_R;
        const type = normY > 0.5 ? T_WATER : T_WAX;
        particles.push({
          x, y,
          vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
          rho:0, p:0, type, mass:MASS, isBoundary:false,
          temp: AMBIENT_TEMP, hue:0, isTracer:false, trail:null,
          _vx0:0, _vy0:0
        });
      }
    }
    row++;
  }
  // Assign hues for multi-color layers
  let wMin=Infinity,wMax=-Infinity,xMin=Infinity,xMax=-Infinity;
  for (const p of particles) {
    if (p.type === T_WATER) { wMin=Math.min(wMin,p.y); wMax=Math.max(wMax,p.y); }
    else { xMin=Math.min(xMin,p.y); xMax=Math.max(xMax,p.y); }
  }
  for (const p of particles) {
    if (p.type === T_WATER) {
      const t = wMax > wMin ? (p.y - wMin) / (wMax - wMin) : 0.5;
      p.hue = 200 + t * 45;
    } else {
      const t = xMax > xMin ? (p.y - xMin) / (xMax - xMin) : 0.5;
      p.hue = 15 + t * 40;
    }
  }
}

// ============================================================
//  DENSITY CALIBRATION
// ============================================================
function calibrateRestDensity() {
  buildGrid(allParticles);
  for (const p of particles) p.rho = computeDensity(p, allParticles);

  let sumW=0,cW=0,sumX=0,cX=0;
  for (const p of particles) {
    if (p.type===T_WATER) { sumW+=p.rho; cW++; }
    else { sumX+=p.rho; cX++; }
  }
  RHO0_WATER = sumW / cW;
  RHO0_WAX = RHO0_WATER * densityRatio;
  const allowedVar = 0.04, H_col = BOWL_R * 0.85;
  B_WATER = RHO0_WATER * GRAVITY * H_col / (allowedVar * GAMMA);
  B_WAX = B_WATER * 0.35;
}

// ============================================================
//  GRID BUILD
// ============================================================
function buildGrid(arr) {
  for (let i = 0; i < GRID_SIZE; i++) gridCounts[i] = 0;
  for (let i = 0; i < arr.length; i++) {
    const p = arr[i];
    const cx = Math.floor(p.x / CELL), cy = Math.floor(p.y / CELL);
    p._cx = cx; p._cy = cy;
    const idx = cy * COLS + cx;
    if (idx >= 0 && idx < GRID_SIZE) gridCounts[idx]++;
  }
  let offset = 0;
  for (let i = 0; i < GRID_SIZE; i++) {
    const c = gridCounts[i];
    gridCounts[i] = offset;
    offset += c;
    gridCells[i] = new Array(c);
  }
  const cursors = new Int32Array(GRID_SIZE);
  for (let i = 0; i < arr.length; i++) {
    const p = arr[i];
    const idx = p._cy * COLS + p._cx;
    if (idx >= 0 && idx < GRID_SIZE) {
      const pos = gridCounts[idx] + cursors[idx];
      gridCells[idx][pos] = p;
      cursors[idx]++;
    }
  }
}

// ============================================================
//  DENSITY COMPUTATION
// ============================================================
function computeDensity(pi, allArr) {
  let rho = pi.mass * 4 * SIGMA; // W(0)
  const cx = pi._cx, cy = pi._cy;
  for (let dy=-1; dy<=1; dy++) {
    for (let dx=-1; dx<=1; dx++) {
      const nx=cx+dx, ny=cy+dy;
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
      const cell = gridCells[ny*COLS+nx];
      const count = gridCounts[ny*COLS+nx];
      for (let k=0; k<count; k++) {
        const pj = cell[k];
        if (pj === pi) continue;
        const dxij=pi.x-pj.x, dyij=pi.y-pj.y;
        const r2=dxij*dxij+dyij*dyij;
        if (r2 >= 4*H2) continue;
        rho += pj.mass * kernelW(Math.sqrt(r2));
      }
    }
  }
  return Math.max(rho, 1e-10);
}

// ============================================================
//  TAIT PRESSURE
// ============================================================
function taitPressure(rho, rho0, B) {
  const ratio = rho / rho0;
  if (ratio <= 0) return 0;
  return B * (Math.pow(ratio, GAMMA) - 1);
}

// ============================================================
//  OBSTACLE & BUBBLE FORCES (per-particle helpers)
// ============================================================
function applyObstacleForces(p) {
  for (const o of obstacles) {
    const dx = p.x - o.x, dy = p.y - o.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minD = o.radius + 3;
    if (dist < minD && dist > 0.001) {
      const overlap = minD - dist;
      const force = overlap * 5000 * DT;
      p.vx += (dx/dist) * force;
      p.vy += (dy/dist) * force;
    }
  }
}

function applyBubbleForces(p) {
  for (const b of bubbles) {
    const dx = p.x - b.x, dy = p.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < b.radius && dist > 0.001) {
      const falloff = 1 - dist/b.radius;
      const force = falloff * b.strength * 200 * DT;
      p.vx += (dx/dist) * force;
      p.vy += (dy/dist) * force;
    }
  }
}

// ============================================================
//  TEMPERATURE
// ============================================================
function updateTemperature() {
  const coolRate = 0.003;
  for (const p of particles) {
    p.temp += (AMBIENT_TEMP - p.temp) * coolRate;
  }
}

function heatNearMouse() {
  if (!mouseDown) return;
  for (const p of particles) {
    const dx = p.x - mouseX, dy = p.y - mouseY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < STIR_RADIUS) {
      const heating = (1 - dist/STIR_RADIUS) * 1.5;
      p.temp = Math.min(p.temp + heating, MAX_TEMP);
    }
  }
}

// ============================================================
//  SIMULATION STEP
// ============================================================
function getGravityVec() {
  const sign = gravityReversed ? -1 : 1;
  const rad = gravityAngle * Math.PI / 180;
  return {
    gx: GRAVITY * Math.sin(rad) * sign,
    gy: GRAVITY * Math.cos(rad) * sign
  };
}

function simulate(dt) {
  buildGrid(allParticles);

  for (const p of particles) p.rho = computeDensity(p, allParticles);
  for (const b of boundaries) b.rho = computeDensity(b, allParticles);

  for (const p of particles) {
    const rho0 = p.type===T_WATER ? RHO0_WATER : RHO0_WAX;
    const B = p.type===T_WATER ? B_WATER : B_WAX;
    p.p = taitPressure(p.rho, rho0, B);
    if (p.p < 0) p.p = 0;
  }
  for (const b of boundaries) { b.p = taitPressure(b.rho, RHO0_WATER, B_WATER); if(b.p<0)b.p=0; }

  for (const p of particles) { p._vx0 = p.vx; p._vy0 = p.vy; }

  const { gx, gy } = getGravityVec();

  for (const pi of particles) {
    let fx = 0, fy = 0;
    const cx = pi._cx, cy = pi._cy;
    const rho0_i = pi.type===T_WATER ? RHO0_WATER : RHO0_WAX;
    const Bi = pi.type===T_WATER ? B_WATER : B_WAX;

    // Temperature-dependent wax viscosity
    let alpha_i = pi.type===T_WATER ? ALPHA_WATER : ALPHA_WAX;
    if (pi.type === T_WAX) {
      const tNorm = Math.max(0, Math.min(1, (pi.temp - AMBIENT_TEMP) / 55));
      alpha_i = ALPHA_WAX * (1 - 0.85 * tNorm);
    }

    const ci = Math.sqrt(Bi * GAMMA / rho0_i);
    const presTermI = pi.p / (pi.rho * pi.rho);

    for (let dy=-1; dy<=1; dy++) {
      for (let dx=-1; dx<=1; dx++) {
        const nx=cx+dx, ny=cy+dy;
        if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
        const cell = gridCells[ny*COLS+nx];
        if (!cell) continue;
        const count = gridCounts[ny*COLS+nx];

        for (let k=0; k<count; k++) {
          const pj = cell[k];
          if (pj === pi) continue;
          const dxij=pi.x-pj.x, dyij=pi.y-pj.y;
          const r2=dxij*dxij+dyij*dyij;
          if (r2>=4*H2 || r2<1e-12) continue;
          const r = Math.sqrt(r2);
          const dwdr = kernelDWdr(r);
          if (dwdr===0) continue;

          const rho0_j = pj.isBoundary ? RHO0_WATER : (pj.type===T_WATER ? RHO0_WATER : RHO0_WAX);
          const Bj = pj.isBoundary ? B_WATER : (pj.type===T_WATER ? B_WATER : B_WAX);
          const presTermJ = pj.p/(pj.rho*pj.rho);
          const pForce = (presTermI + presTermJ) * dwdr / r;

          const dvx = pi._vx0 - (pj.isBoundary?0:pj._vx0);
          const dvy = pi._vy0 - (pj.isBoundary?0:pj._vy0);
          const vDotR = dvx*dxij + dvy*dyij;

          let viscTerm = 0;
          if (vDotR < 0) {
            const rhoBar = (pi.rho+pj.rho)*0.5;
            const alphaBar = pj.isBoundary ? alpha_i : (alpha_i + (pj.type===T_WATER ? ALPHA_WATER : ALPHA_WAX))*0.5;
            const cBar = pj.isBoundary ? ci : (ci + Math.sqrt(Bj*GAMMA/rho0_j))*0.5;
            const mu = H_K * vDotR / (r2 + EPS_H2);
            const pi_ij = -alphaBar * cBar * mu / rhoBar;
            viscTerm = pi_ij * dwdr / r;
          }

          const totalForce = -(pForce + viscTerm);
          fx += pj.mass * totalForce * dxij;
          fy += pj.mass * totalForce * dyij;
        }
      }
    }

    // Gravity
    fx += gx;
    fy += gy;

    // Obstacle & bubble forces
    applyObstacleForces(pi);
    applyBubbleForces(pi);

    pi.vx += fx * dt;
    pi.vy += fy * dt;
  }

  // Position update & boundary
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    const dx = p.x - BOWL_CX, dy = p.y - BOWL_CY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (p.y >= BOWL_CY - 3 && dist > BOWL_R - 2) {
      const nx = dx / dist, ny = dy / dist;
      p.x = BOWL_CX + nx * (BOWL_R - 3);
      p.y = BOWL_CY + ny * (BOWL_R - 3);
      const vn = p.vx*nx + p.vy*ny;
      if (vn < 0) { p.vx -= 1.2*vn*nx; p.vy -= 1.2*vn*ny; }
    }
  }

  // Update obstacles (physics for non-dragged ones)
  updateObstacles(dt);

  // Update bubbles
  updateBubbles(dt);

  // Temperature decay
  updateTemperature();
}

// ============================================================
//  OBSTACLE PHYSICS
// ============================================================
function updateObstacles(dt) {
  const { gx, gy } = getGravityVec();
  for (const o of obstacles) {
    if (o.isDragging) continue;
    o.vx += gx * dt;
    o.vy += gy * dt;
    o.x += o.vx * dt;
    o.y += o.vy * dt;
    o.vx *= 0.98;
    o.vy *= 0.98;
    // Constrain inside bowl
    const dx = o.x - BOWL_CX, dy = o.y - BOWL_CY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > BOWL_R - o.radius - 2) {
      const nx = dx/dist, ny = dy/dist;
      o.x = BOWL_CX + nx * (BOWL_R - o.radius - 2);
      o.y = BOWL_CY + ny * (BOWL_R - o.radius - 2);
      const vn = o.vx*nx + o.vy*ny;
      if (vn < 0) { o.vx -= 1.5*vn*nx; o.vy -= 1.5*vn*ny; }
    }
    // Don't go above opening
    if (o.y < BOWL_CY + o.radius + 2) {
      o.y = BOWL_CY + o.radius + 2;
      if (o.vy < 0) o.vy *= -0.5;
    }
  }
}

// ============================================================
//  BUBBLE PHYSICS
// ============================================================
function updateBubbles(dt) {
  for (let i = bubbles.length-1; i >= 0; i--) {
    const b = bubbles[i];
    b.life -= dt;
    if (b.life <= 0) {
      // Pop: impulse outward
      for (const p of particles) {
        const dx = p.x - b.x, dy = p.y - b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < b.radius*1.5 && dist > 0.01) {
          const f = (1 - dist/(b.radius*1.5)) * 300 * DT;
          p.vx += (dx/dist) * f;
          p.vy += (dy/dist) * f;
        }
      }
      bubbles.splice(i,1);
      continue;
    }
    // Expand
    const progress = 1 - b.life / b.maxLife;
    b.radius = b.minRadius + (b.maxRadius - b.minRadius) * Math.sin(progress * Math.PI);
    // Rise
    b.y -= 80 * dt;
    // Stay in bowl
    const dx = b.x - BOWL_CX, dy = b.y - BOWL_CY;
    if (Math.sqrt(dx*dx+dy*dy) > BOWL_R - b.radius) b.life = 0;
    if (b.y < BOWL_CY - BOWL_R + b.radius) b.life = 0;
  }
}

// ============================================================
//  MOUSE & TOOLS
// ============================================================
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function hitObstacle(mx, my) {
  for (const o of obstacles) {
    const dx = mx - o.x, dy = my - o.y;
    if (Math.sqrt(dx*dx+dy*dy) < o.radius + 5) return o;
  }
  return null;
}

function injectParticles(x, y, type, count) {
  if (particles.length >= 1000) return;
  const actual = Math.min(count, 1000 - particles.length);
  for (let i = 0; i < actual; i++) {
    const ang = Math.random()*Math.PI*2;
    const dist = Math.random()*12;
    const px = x + Math.cos(ang)*dist, py = y + Math.sin(ang)*dist;
    if (!isInsideBowl(px, py, 5)) continue;
    particles.push({
      x:px, y:py,
      vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
      rho:0, p:0, type, mass:MASS, isBoundary:false,
      temp: AMBIENT_TEMP,
      hue: type===T_WATER ? (210 + Math.random()*30) : (20 + Math.random()*35),
      isTracer:false, trail:null, _vx0:0, _vy0:0
    });
  }
  rebuildAllParticles();
}

function selectTracer(mx, my) {
  let best = null, bestDist = Infinity;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const dx = p.x - mx, dy = p.y - my;
    const d = dx*dx + dy*dy;
    if (d < bestDist) { bestDist = d; best = i; }
  }
  if (best !== null && bestDist < 1600) { // within 40px
    const p = particles[best];
    if (p.isTracer) {
      p.isTracer = false; p.trail = null;
      tracerIndices = tracerIndices.filter(i => i !== best);
    } else {
      if (tracerIndices.length >= 15) {
        const old = tracerIndices.shift();
        particles[old].isTracer = false; particles[old].trail = null;
      }
      p.isTracer = true; p.trail = [];
      tracerIndices.push(best);
    }
  }
}

canvas.addEventListener('mousedown', (e) => {
  const pos = getMousePos(e);
  mouseDown = true;
  mouseX = pos.x; mouseY = pos.y;
  prevMouseX = mouseX; prevMouseY = mouseY;
  framePrevMX = mouseX; framePrevMY = mouseY;

  switch (currentTool) {
    case 'obstacle': {
      dragObstacle = hitObstacle(mouseX, mouseY);
      if (!dragObstacle) {
        if (obstacles.length >= 3) return;
        if (!isInsideBowl(mouseX, mouseY, 15)) return;
        dragObstacle = { x:mouseX, y:mouseY, radius:25, vx:0, vy:0, isDragging:true };
        obstacles.push(dragObstacle);
      } else {
        dragObstacle.isDragging = true;
        dragObstacle.vx = 0; dragObstacle.vy = 0;
      }
      break;
    }
    case 'injectWater': injectParticles(mouseX, mouseY, T_WATER, 15); break;
    case 'injectWax':   injectParticles(mouseX, mouseY, T_WAX, 15); break;
    case 'bubble': {
      if (bubbles.length >= 5) break;
      if (!isInsideBowl(mouseX, mouseY, 10)) break;
      bubbles.push({ x:mouseX, y:mouseY, radius:5, minRadius:5, maxRadius:40, life:1.2, maxLife:1.2, strength:1.0 });
      break;
    }
    case 'tracer': selectTracer(mouseX, mouseY); break;
  }
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getMousePos(e);
  prevMouseX = mouseX; prevMouseY = mouseY;
  mouseX = pos.x; mouseY = pos.y;
  if (!mouseDown) {
    prevMouseX = mouseX; prevMouseY = mouseY;
    framePrevMX = mouseX; framePrevMY = mouseY;
  }
  if (dragObstacle) {
    dragObstacle.x = mouseX;
    dragObstacle.y = mouseY;
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragObstacle) {
    dragObstacle.vx = (mouseX - prevMouseX) / DT * 0.3;
    dragObstacle.vy = (mouseY - prevMouseY) / DT * 0.3;
    dragObstacle.isDragging = false;
    dragObstacle = null;
  }
  if (currentTool === 'injectWater' || currentTool === 'injectWax' || currentTool === 'bubble' || currentTool === 'tracer') {
    // Don't stop mouseDown for click tools — they already fired on mousedown
    // But if we were dragging from stir mode, let mouseDown reset
  }
  mouseDown = false;
});

canvas.addEventListener('mouseleave', () => {
  if (dragObstacle) {
    dragObstacle.isDragging = false;
    dragObstacle = null;
  }
  mouseDown = false;
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  // Right-click to remove nearest obstacle
  const pos = getMousePos(e);
  const o = hitObstacle(pos.x, pos.y);
  if (o) {
    obstacles = obstacles.filter(ob => ob !== o);
    if (dragObstacle === o) dragObstacle = null;
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  const pos = getMousePos(e.touches[0]);
  mouseX = pos.x; mouseY = pos.y;
  prevMouseX = mouseX; prevMouseY = mouseY;
  framePrevMX = mouseX; framePrevMY = mouseY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const pos = getMousePos(e.touches[0]);
  prevMouseX = mouseX; prevMouseY = mouseY;
  mouseX = pos.x; mouseY = pos.y;
}, { passive: false });

canvas.addEventListener('touchend', () => { mouseDown = false; });

// Scroll to adjust particle count
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  adjustParticleCount(e.deltaY < 0 ? 30 : -30);
});

function adjustParticleCount(delta) {
  if (delta > 0) {
    const toAdd = Math.min(delta, 1000 - particles.length);
    for (let i = 0; i < toAdd; i++) {
      const ang = Math.random() * Math.PI;
      const r = Math.random() * (BOWL_R - 15);
      const px = BOWL_CX + r * Math.cos(ang);
      const py = BOWL_CY + r * Math.sin(ang) + 5;
      const type = Math.random() < 0.5 ? T_WATER : T_WAX;
      particles.push({
        x:px, y:py, vx:0, vy:0, rho:0, p:0, type, mass:MASS, isBoundary:false,
        temp: AMBIENT_TEMP, hue: type===T_WATER?220:35, isTracer:false, trail:null,
        _vx0:0, _vy0:0
      });
    }
  } else {
    const toRemove = Math.min(-delta, particles.length - 200);
    for (let i = 0; i < toRemove; i++) {
      const idx = Math.floor(Math.random() * particles.length);
      const p = particles[idx];
      if (p.isTracer) {
        tracerIndices = tracerIndices.filter(j => j !== idx);
      }
      // Remove from particles
      particles.splice(idx, 1);
      // Update tracerIndices (indices shift)
      for (let j = tracerIndices.length-1; j >= 0; j--) {
        if (tracerIndices[j] > idx) tracerIndices[j]--;
      }
    }
  }
  rebuildAllParticles();
  document.getElementById('count').textContent = particles.length;
}

function applyMouseForce() {
  // Heating — applies to all tools when mouse is down
  heatNearMouse();

  if (!mouseDown || currentTool !== 'stir') {
    framePrevMX = mouseX; framePrevMY = mouseY;
    return;
  }

  const mvx = mouseX - framePrevMX, mvy = mouseY - framePrevMY;
  const mouseSpeed = Math.sqrt(mvx*mvx + mvy*mvy);
  framePrevMX = mouseX; framePrevMY = mouseY;
  if (mouseSpeed < 0.5) return;

  for (const p of particles) {
    const dx = p.x - mouseX, dy = p.y - mouseY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < STIR_RADIUS) {
      const falloff = 1 - dist/STIR_RADIUS;
      const strength = falloff*falloff * STIR_STRENGTH;
      p.vx += mvx * strength;
      p.vy += mvy * strength;
      if (dist > 2) {
        const push = strength * 120;
        p.vx += (dx/dist) * push;
        p.vy += (dy/dist) * push;
      }
    }
  }
}

// ============================================================
//  RECORDING
// ============================================================
function toggleRecording() {
  const btn = document.getElementById('recBtn');
  const status = document.getElementById('status');
  if (isRecording) {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '⏺ 录制';
    status.textContent = '';
  } else {
    if (typeof MediaRecorder === 'undefined') {
      status.textContent = '不支持录制';
      return;
    }
    recordedChunks = [];
    const stream = canvas.captureStream(60);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
    mediaRecorder.ondataavailable = e => { if (e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type:'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'sph_fluid.webm';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      status.textContent = '已保存';
      setTimeout(() => { if(!isRecording) status.textContent=''; }, 2000);
    };
    mediaRecorder.start();
    isRecording = true;
    btn.classList.add('recording');
    btn.textContent = '⏹ 停止';
    status.textContent = '录制中...';
  }
}

// ============================================================
//  RENDERING
// ============================================================
function drawBowl() {
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=20; ctx.shadowOffsetY=4;
  ctx.beginPath(); ctx.arc(BOWL_CX,BOWL_CY,BOWL_R,0,Math.PI); ctx.closePath();
  const grad = ctx.createLinearGradient(BOWL_CX,BOWL_CY-BOWL_R,BOWL_CX,BOWL_CY+BOWL_R);
  grad.addColorStop(0,'#3a3a4a'); grad.addColorStop(0.5,'#2a2a38'); grad.addColorStop(1,'#1a1a28');
  ctx.fillStyle=grad; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  ctx.strokeStyle='#555'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(BOWL_CX,BOWL_CY,BOWL_R,0,Math.PI);
  ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(BOWL_CX,BOWL_CY,BOWL_R-3,0.05,Math.PI-0.05);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(BOWL_CX,BOWL_CY,BOWL_R-2,0,Math.PI); ctx.closePath();
  ctx.fillStyle='rgba(20,20,35,0.85)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(BOWL_CX-BOWL_R,BOWL_CY); ctx.lineTo(BOWL_CX+BOWL_R,BOWL_CY);
  ctx.strokeStyle='#4a4a5a'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (let pass=0; pass<2; pass++) {
    const targetType = pass===0 ? T_WATER : T_WAX;
    for (const p of particles) {
      if (p.type !== targetType) continue;
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const t = Math.min(1, speed / 500);
      const lightness = 28 + t * 42;
      const saturation = 50 + t * 30;
      // Main
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.2, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},${saturation}%,${lightness}%,1)`;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5.8, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},${saturation}%,${lightness}%,0.12)`;
      ctx.fill();
    }
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.radius, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(o.x-5,o.y-5,2,o.x,o.y,o.radius);
    grad.addColorStop(0,'#888'); grad.addColorStop(1,'#333');
    ctx.fillStyle=grad; ctx.fill();
    ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
    // X mark
    const s = o.radius * 0.5;
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(o.x-s,o.y-s); ctx.lineTo(o.x+s,o.y+s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(o.x+s,o.y-s); ctx.lineTo(o.x-s,o.y+s); ctx.stroke();
  }
}

function drawBubbles() {
  for (const b of bubbles) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
    ctx.strokeStyle='rgba(200,220,255,0.6)'; ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle=`rgba(200,220,255,${0.08 + 0.05 * (b.life/b.maxLife)})`;
    ctx.fill();
    // Highlight
    ctx.beginPath(); ctx.arc(b.x - b.radius*0.3, b.y - b.radius*0.3, b.radius*0.3, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fill();
  }
}

function drawTrails() {
  for (const idx of tracerIndices) {
    const p = particles[idx];
    if (!p || !p.trail || p.trail.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(p.trail[0].x, p.trail[0].y);
    for (let i = 1; i < p.trail.length; i++) {
      ctx.lineTo(p.trail[i].x, p.trail[i].y);
    }
    ctx.strokeStyle = `hsla(${p.hue},70%,60%,0.8)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Fade out old segments
    for (let i = 1; i < p.trail.length; i++) {
      const alpha = 0.15 + 0.6 * (i / p.trail.length);
      ctx.beginPath();
      ctx.moveTo(p.trail[i-1].x, p.trail[i-1].y);
      ctx.lineTo(p.trail[i].x, p.trail[i].y);
      ctx.strokeStyle = `hsla(${p.hue},70%,60%,${alpha})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function drawToolIndicator() {
  if (currentTool === 'obstacle' && !mouseDown) {
    const mx = mouseX, my = mouseY;
    if (mx < 0 || mx > W || my < 0 || my > H) return;
    const o = hitObstacle(mx, my);
    if (o) {
      ctx.beginPath(); ctx.arc(o.x, o.y, o.radius+5, 0, Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    }
  }
  if (currentTool === 'bubble' && !mouseDown) {
    if (mouseX<0||mouseX>W||mouseY<0||mouseY>H) return;
    ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2);
    ctx.strokeStyle='rgba(200,220,255,0.5)'; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
  }
  if (!mouseDown) return;
  if (currentTool === 'stir') {
    ctx.beginPath(); ctx.arc(mouseX, mouseY, STIR_RADIUS, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(mouseX, mouseY, 5, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
    const mvx=mouseX-prevMouseX, mvy=mouseY-prevMouseY;
    const speed=Math.sqrt(mvx*mvx+mvy*mvy);
    if (speed>1) {
      ctx.beginPath(); ctx.moveTo(prevMouseX,prevMouseY); ctx.lineTo(mouseX,mouseY);
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=3; ctx.stroke();
    }
  }
  if (currentTool === 'injectWater' || currentTool === 'injectWax') {
    const color = currentTool==='injectWater'?'rgba(59,139,245,0.5)':'rgba(240,176,40,0.5)';
    ctx.beginPath(); ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2);
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=color; ctx.fill();
  }
  if (currentTool === 'tracer') {
    ctx.beginPath(); ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,100,255,0.6)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX-12,mouseY); ctx.lineTo(mouseX+12,mouseY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX,mouseY-12); ctx.lineTo(mouseX,mouseY+12); ctx.stroke();
  }
}

function drawTempIndicator() {
  // Draw a thermometer bar on left side of bowl
  let hotCount = 0;
  for (const p of particles) { if (p.temp > 35) hotCount++; }
  if (hotCount === 0) return;
  const x = BOWL_CX - BOWL_R + 10, y0 = BOWL_CY + BOWL_R - 20, y1 = BOWL_CY + 10;
  const hotRatio = Math.min(1, hotCount / particles.length);
  const barH = y0 - y1;
  const fillH = barH * hotRatio;
  ctx.fillStyle='rgba(255,100,50,0.3)';
  ctx.fillRect(x-4, y0-fillH, 8, fillH);
  ctx.strokeStyle='rgba(255,150,100,0.4)'; ctx.lineWidth=1;
  ctx.strokeRect(x-4, y1, 8, barH);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBowl();
  drawTempIndicator();
  drawTrails();
  drawObstacles();
  drawBubbles();
  drawParticles();
  drawToolIndicator();
}

// ============================================================
//  UPDATE TRAILS (called every 2 frames)
// ============================================================
function updateTrails() {
  for (const idx of tracerIndices) {
    const p = particles[idx];
    if (!p) continue;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 40) p.trail.shift();
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
let accTime = 0, lastTime = 0, frameCount = 0, fpsTime = 0, displayFPS = 0;

function loop(timestamp) {
  requestAnimationFrame(loop);

  if (lastTime === 0) lastTime = timestamp;
  let frameTime = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (frameTime > 0.05) frameTime = 0.05;

  frameCount++;
  fpsTime += frameTime;
  if (fpsTime >= 0.5) {
    displayFPS = Math.round(frameCount/fpsTime);
    frameCount = 0; fpsTime = 0;
    document.getElementById('fps').textContent = displayFPS;
    document.getElementById('count').textContent = particles.length;
  }

  applyMouseForce();

  accTime += frameTime;
  let steps = 0;
  while (accTime >= DT && steps < MAX_SUBSTEPS) {
    simulate(DT);
    accTime -= DT;
    steps++;
  }

  frameCount2++;
  if (frameCount2 % 2 === 0) updateTrails();

  render();
}

// ============================================================
//  RESET
// ============================================================
function reset() {
  initBoundaries();
  initParticles();
  obstacles = [];
  bubbles = [];
  tracerIndices = [];
  dragObstacle = null;
  rebuildAllParticles();
  calibrateRestDensity();
  accTime = 0; lastTime = 0; frameCount = 0; fpsTime = 0; frameCount2 = 0;
  framePrevMX = mouseX; framePrevMY = mouseY;
  document.getElementById('count').textContent = particles.length;
  document.getElementById('fps').textContent = '--';
}

document.getElementById('sGrav').addEventListener('input', function() {
  GRAVITY = parseInt(this.value);
  document.getElementById('vGrav').textContent = this.value;
});
document.getElementById('sStir').addEventListener('input', function() {
  STIR_STRENGTH = parseFloat(this.value);
  document.getElementById('vStir').textContent = this.value;
});

// Gravity pad
document.querySelectorAll('.grav-btn[data-angle]').forEach(btn => {
  btn.addEventListener('click', () => {
    gravityAngle = parseInt(btn.dataset.angle);
    document.querySelectorAll('.grav-btn[data-angle]').forEach(b => b.classList.remove('grav-active'));
    btn.classList.add('grav-active');
  });
});

// Gravity reverse
document.getElementById('gravRev').addEventListener('click', function() {
  gravityReversed = !gravityReversed;
  this.classList.toggle('active', gravityReversed);
});

// Record
document.getElementById('recBtn').addEventListener('click', toggleRecording);

// Reset
document.getElementById('rstBtn').addEventListener('click', reset);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') reset();
  if (e.code === 'Space') {
    e.preventDefault();
    gravityReversed = !gravityReversed;
    document.getElementById('gravRev').classList.toggle('active', gravityReversed);
  }
  // Number keys to switch tools
  if (e.key === '1') { document.querySelector('[data-tool="stir"]').click(); }
  if (e.key === '2') { document.querySelector('[data-tool="injectWater"]').click(); }
  if (e.key === '3') { document.querySelector('[data-tool="injectWax"]').click(); }
  if (e.key === '4') { document.querySelector('[data-tool="bubble"]').click(); }
  if (e.key === '5') { document.querySelector('[data-tool="obstacle"]').click(); }
  if (e.key === '6') { document.querySelector('[data-tool="tracer"]').click(); }
});

// ============================================================
//  STARTUP
// ============================================================
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
